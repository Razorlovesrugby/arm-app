<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6B21A8" />
    <title>ARM — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F8F8F8;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 360px;
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #6B21A8;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        color: white;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -1px;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #111827;
      }
      p {
        font-size: 15px;
        color: #6B7280;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      button {
        background: #6B21A8;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 14px 24px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        min-height: 48px;
      }
      button:active {
        background: #581C87;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">ARM</div>
      <h1>You're offline</h1>
      <p>Reconnect to use ARM. Your data is safe and will sync when you're back online.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
